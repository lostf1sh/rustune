name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
      release_name:
        description: "Release title shown on GitHub"
        required: false
        default: ""
        type: string
      draft:
        description: "Create the release as a draft"
        required: false
        default: true
        type: boolean
      prerelease:
        description: "Mark the release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.version }}
          releaseName: ${{ inputs.release_name != '' && inputs.release_name || format('Rustune {0}', inputs.version) }}
          releaseBody: |
            Automated release created from GitHub Actions.

            Tag: ${{ inputs.version }}
            Commit: ${{ github.sha }}
          releaseDraft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          args: ${{ matrix.args }}
